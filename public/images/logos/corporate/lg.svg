<svg xmlns="http://www.w3.org/2000/svg" width="200" height="80" viewBox="0 0 200 80">
  <!-- LG circle/face logo -->
  <g transform="translate(100,26)">
    <circle cx="0" cy="0" r="20" fill="none" stroke="#A50034" stroke-width="3.5"/>
    <!-- L inside (nose shape) -->
    <path d="M-6,-10 L-6,6 L8,6" stroke="#A50034" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Eye dot -->
    <circle cx="7" cy="-2" r="3.5" fill="#A50034"/>
  </g>
  <!-- LG wordmark -->
  <text x="100" y="70" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="700" fill="#A50034" letter-spacing="6">LG</text>
</svg>
