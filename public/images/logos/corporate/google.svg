<svg xmlns="http://www.w3.org/2000/svg" width="200" height="80" viewBox="0 0 200 80">
  <!-- Google multicolor G symbol -->
  <g transform="translate(100,24)">
    <!-- G circle segments -->
    <path d="M16,0 A16,16 0 0,1 -8,13.86" fill="#34A853" stroke="none"/>
    <path d="M-8,13.86 A16,16 0 0,1 -8,-13.86" fill="#FBBC05" stroke="none"/>
    <path d="M-8,-13.86 A16,16 0 0,1 16,0" fill="#EA4335" stroke="none"/>
    <!-- Blue right section -->
    <path d="M16,0 A16,16 0 0,1 4.94,15.22 L0,0 Z" fill="#4285F4"/>
    <!-- Inner cutout -->
    <circle cx="0" cy="0" r="9" fill="white"/>
    <!-- Blue horizontal bar of G -->
    <rect x="0" y="-3" width="18" height="6" fill="#4285F4"/>
  </g>
  <!-- Google wordmark -->
  <text x="100" y="66" text-anchor="middle" font-family="'Product Sans', 'Helvetica Neue', Arial, sans-serif" font-size="26" font-weight="500" fill="#4285F4">Google</text>
</svg>
