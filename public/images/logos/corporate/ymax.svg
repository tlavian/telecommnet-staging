<svg xmlns="http://www.w3.org/2000/svg" width="200" height="80" viewBox="0 0 200 80" fill="none">
  <!-- YMAX - Telecom (magicJack parent) -->
  <!-- Stylized Y with signal lines -->
  <path d="M82 8 L100 28 L118 8" fill="none" stroke="#005DAA" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="100" y1="28" x2="100" y2="38" stroke="#005DAA" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Signal arcs -->
  <path d="M76 14 Q76 8 82 8" fill="none" stroke="#0088CC" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <path d="M124 14 Q124 8 118 8" fill="none" stroke="#0088CC" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <!-- Company name -->
  <text x="100" y="60" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="800" fill="#005DAA" letter-spacing="6">YMAX</text>
</svg>
