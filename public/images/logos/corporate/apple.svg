<svg xmlns="http://www.w3.org/2000/svg" width="200" height="80" viewBox="0 0 200 80">
  <!-- Apple silhouette symbol -->
  <g transform="translate(100,26)">
    <!-- Apple body -->
    <ellipse cx="-5" cy="2" rx="11" ry="15" fill="#1a1a1a"/>
    <ellipse cx="5" cy="2" rx="11" ry="15" fill="#1a1a1a"/>
    <!-- Bite cutout -->
    <circle cx="16" cy="-5" r="7" fill="white"/>
    <!-- Stem -->
    <path d="M1,-15 Q2,-22 6,-20" stroke="#1a1a1a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- Leaf -->
    <ellipse cx="5" cy="-19" rx="5" ry="2.5" fill="#1a1a1a" transform="rotate(25,5,-19)"/>
  </g>
  <!-- Apple wordmark -->
  <text x="100" y="68" text-anchor="middle" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="600" fill="#1a1a1a">Apple</text>
</svg>
