<svg xmlns="http://www.w3.org/2000/svg" width="200" height="80" viewBox="0 0 200 80" fill="none">
  <!-- TicketNetwork - Online ticket marketplace -->
  <!-- Ticket symbol -->
  <rect x="78" y="10" width="44" height="28" rx="4" fill="#1B3A6B"/>
  <!-- Ticket perforations -->
  <circle cx="78" cy="24" r="4" fill="white"/>
  <circle cx="122" cy="24" r="4" fill="white"/>
  <!-- Ticket lines -->
  <line x1="86" y1="18" x2="114" y2="18" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="86" y1="23" x2="106" y2="23" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>
  <line x1="86" y1="28" x2="114" y2="28" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <!-- Barcode-style lines -->
  <line x1="108" y1="25" x2="108" y2="33" stroke="#FFFFFF" stroke-width="1" opacity="0.5"/>
  <line x1="110" y1="25" x2="110" y2="33" stroke="#FFFFFF" stroke-width="1.5" opacity="0.5"/>
  <line x1="113" y1="25" x2="113" y2="33" stroke="#FFFFFF" stroke-width="1" opacity="0.5"/>
  <line x1="115" y1="25" x2="115" y2="33" stroke="#FFFFFF" stroke-width="1.5" opacity="0.5"/>
  <!-- Company name -->
  <text x="100" y="55" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="700" fill="#1B3A6B" letter-spacing="1">TICKET</text>
  <text x="100" y="68" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="700" fill="#1B3A6B" letter-spacing="1">NETWORK</text>
</svg>
