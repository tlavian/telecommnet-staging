<svg xmlns="http://www.w3.org/2000/svg" width="200" height="80" viewBox="0 0 200 80">
  <!-- ServiceNow logo mark -->
  <g transform="translate(100,24)">
    <!-- Circular gear-like symbol -->
    <circle cx="0" cy="0" r="14" fill="none" stroke="#81B5A1" stroke-width="3.5"/>
    <circle cx="0" cy="0" r="5" fill="#81B5A1"/>
    <!-- Small notches -->
    <rect x="-2" y="-18" width="4" height="5" rx="1" fill="#81B5A1"/>
    <rect x="-2" y="13" width="4" height="5" rx="1" fill="#81B5A1"/>
    <rect x="-18" y="-2" width="5" height="4" rx="1" fill="#81B5A1"/>
    <rect x="13" y="-2" width="5" height="4" rx="1" fill="#81B5A1"/>
  </g>
  <!-- ServiceNow wordmark -->
  <text x="100" y="66" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="19" font-weight="700" fill="#293E40" letter-spacing="1">ServiceNow</text>
</svg>
