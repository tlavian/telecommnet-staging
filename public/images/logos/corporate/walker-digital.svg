<svg xmlns="http://www.w3.org/2000/svg" width="200" height="80" viewBox="0 0 200 80" fill="none">
  <!-- Walker Digital - Technology/patent company -->
  <!-- Stylized W with digital grid -->
  <path d="M82 10 L90 34 L100 18 L110 34 L118 10" fill="none" stroke="#1C2541" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Digital dots -->
  <circle cx="82" cy="10" r="2.5" fill="#3A506B"/>
  <circle cx="90" cy="34" r="2.5" fill="#3A506B"/>
  <circle cx="100" cy="18" r="2.5" fill="#3A506B"/>
  <circle cx="110" cy="34" r="2.5" fill="#3A506B"/>
  <circle cx="118" cy="10" r="2.5" fill="#3A506B"/>
  <!-- Company name -->
  <text x="100" y="55" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700" fill="#1C2541" letter-spacing="2">WALKER</text>
  <text x="100" y="69" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="800" fill="#1C2541" letter-spacing="3">DIGITAL</text>
</svg>
