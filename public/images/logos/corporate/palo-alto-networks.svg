<svg xmlns="http://www.w3.org/2000/svg" width="200" height="80" viewBox="0 0 200 80">
  <!-- Palo Alto Networks crest/shield symbol -->
  <g transform="translate(100,22)">
    <!-- Triangle/crest shape -->
    <path d="M0,-18 L14,10 L-14,10 Z" fill="none" stroke="#FA582D" stroke-width="3.5" stroke-linejoin="round"/>
    <!-- Inner triangle -->
    <path d="M0,-8 L7,6 L-7,6 Z" fill="#FA582D"/>
  </g>
  <!-- Palo Alto Networks wordmark -->
  <text x="100" y="58" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="700" fill="#1a1a1a" letter-spacing="1">PALO ALTO</text>
  <text x="100" y="72" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="600" fill="#666" letter-spacing="2">NETWORKS</text>
</svg>
