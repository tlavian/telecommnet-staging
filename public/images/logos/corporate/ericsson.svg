<svg xmlns="http://www.w3.org/2000/svg" width="200" height="80" viewBox="0 0 200 80">
  <!-- Ericsson three-pronged symbol -->
  <g transform="translate(100,22)">
    <rect x="-14" y="-10" width="5" height="20" rx="2.5" fill="#00449E"/>
    <rect x="-2.5" y="-16" width="5" height="26" rx="2.5" fill="#00449E"/>
    <rect x="9" y="-10" width="5" height="20" rx="2.5" fill="#00449E"/>
    <!-- Base bar -->
    <rect x="-16" y="8" width="32" height="4" rx="2" fill="#00449E"/>
  </g>
  <!-- Ericsson wordmark -->
  <text x="100" y="64" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="26" font-weight="700" fill="#00449E" letter-spacing="2">ERICSSON</text>
</svg>
