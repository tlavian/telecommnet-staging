<svg xmlns="http://www.w3.org/2000/svg" width="200" height="80" viewBox="0 0 200 80">
  <!-- Huawei flower/petal symbol -->
  <g transform="translate(100,22)">
    <!-- Eight petals arranged in a radial pattern -->
    <ellipse cx="0" cy="-12" rx="3" ry="8" fill="#E30613"/>
    <ellipse cx="0" cy="-12" rx="3" ry="8" fill="#E30613" transform="rotate(45)"/>
    <ellipse cx="0" cy="-12" rx="3" ry="8" fill="#E30613" transform="rotate(90)"/>
    <ellipse cx="0" cy="-12" rx="3" ry="8" fill="#E30613" transform="rotate(135)"/>
    <ellipse cx="0" cy="-12" rx="3" ry="8" fill="#E30613" transform="rotate(180)"/>
    <ellipse cx="0" cy="-12" rx="3" ry="8" fill="#E30613" transform="rotate(225)"/>
    <ellipse cx="0" cy="-12" rx="3" ry="8" fill="#E30613" transform="rotate(270)"/>
    <ellipse cx="0" cy="-12" rx="3" ry="8" fill="#E30613" transform="rotate(315)"/>
    <circle cx="0" cy="0" r="3" fill="white"/>
  </g>
  <!-- Huawei wordmark -->
  <text x="100" y="64" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="24" font-weight="700" fill="#E30613" letter-spacing="3">HUAWEI</text>
</svg>
