  <rect x="104" y="14" width="14" height="20" rx="7" fill="none" stroke="#0077B6" stroke-width="3"/>
  <line x1="96" y1="20" x2="104" y2="20" stroke="#0077B6" stroke-width="3" stroke-linecap="round"/>
  <line x1="96" y1="28" x2="104" y2="28" stroke="#0077B6" stroke-width="3" stroke-linecap="round"/>
