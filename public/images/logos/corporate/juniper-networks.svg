<svg xmlns="http://www.w3.org/2000/svg" width="200" height="80" viewBox="0 0 200 80">
  <!-- Juniper three-star symbol -->
  <g transform="translate(100,20)">
    <circle cx="-10" cy="0" r="5" fill="#84B135"/>
    <circle cx="0" cy="-10" r="5" fill="#84B135"/>
    <circle cx="10" cy="0" r="5" fill="#84B135"/>
    <!-- Connecting stems -->
    <line x1="-10" y1="0" x2="0" y2="-10" stroke="#84B135" stroke-width="2"/>
    <line x1="0" y1="-10" x2="10" y2="0" stroke="#84B135" stroke-width="2"/>
  </g>
  <!-- Juniper wordmark -->
  <text x="100" y="62" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="700" fill="#1a1a1a" letter-spacing="2">JUNIPER</text>
</svg>
